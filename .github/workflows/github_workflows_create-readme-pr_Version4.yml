name: Create README PR from Issue Command

on:
  issue_comment:
    types: [created]

jobs:
  create-readme:
    if: ${{ contains(github.event.comment.body, '/create-readme-pr') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure docs dir exists and write README
        run: |
          mkdir -p docs
          cat > docs/README.md <<'EOF'
            # OctoAcme Project Management Docs
            This README provides a concise summary of OctoAcme's project management approach and links to all relevant process documents in this folder.

            ## Summary of OctoAcme Project Management Processes

            OctoAcme follows a customer-first, iterative approach with clear ownership and data-informed decisions. Projects move through a standard lifecycle: Initiation, Planning, Execution, Release, and Retrospective. Core roles (Project Manager, Product Manager, Developers, QA, Stakeholders) and artifacts (Project One-pager / Charter, Backlog, Risk Register, Release Plan, Retrospectives) provide alignment and repeatability.

            Key practices:
            - Iterative delivery with small, testable increments and demos
            - Clear ownership and defined acceptance criteria for backlog items
            - Visible tracking (project board, CI checks, dashboards)
            - Regular communication cadence and escalation paths
            - Continuous improvement via retrospectives and tracked action items
            
            ## Process Documents
            
            - [Project Management Overview](octoacme-project-management-overview.md)
            - [Project Initiation Guide](octoacme-project-initiation.md)
            - [Project Planning](octoacme-project-planning.md)
            - [Execution & Tracking](octoacme-execution-and-tracking.md)
            - [Risk Management & Communication](octoacme-risks-and-communication.md)
            - [Release & Deployment Guide](octoacme-release-and-deployment.md)
            - [Retrospective & Continuous Improvement](octoacme-retrospective-and-continuous-improvement.md)
            - [Roles & Personas](octoacme-roles-and-personas.md)
            
            ## How to use these docs
            
            - Keep each project's Project One-pager / Charter updated in the project repository.
            - Use the project README as the single source of truth for status and links to artifacts (backlog, risk register, release notes).
            - Add process-specific or project-specific context into `.copilot/` when you want Copilot Spaces to use them as context.
            
            ## Acceptance Criteria
            
            - [x] Content aligns with existing process docs
            - [x] Improves clarity and consolidates links to process documents
            - [x] Reviewed by stakeholders as needed
            EOF

      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: docs: add OctoAcme project management README
          title: "[Process Doc Update] Add OctoAcme project management README"
          body: |
            Adds docs/README.md with a summary of OctoAcme project management processes and links to all process docs.

            Closes #2
          base: main
          branch: docs/add-octoacme-readme
          reviewers: suryakiran255
